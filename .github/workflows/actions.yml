name: Update Momentum Dashboard

on:
  schedule:
    - cron: '0 5 * * *'  # Läuft jeden Morgen um 05:00 UTC vollautomatisch
  workflow_dispatch:     # Erlaubt es dir, den Start manuell per Knopfdruck auszulösen

permissions:
  contents: write        # Gewährt dem Roboter explizit Schreibrechte

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Nutzt das integrierte Sicherheits-Token

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas openpyxl

      - name: Run Momentum Script
        run: python streamlit_app.py

      - name: Commit and Push index.html
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Dashboard automatisch aktualisiert" || exit 0
          git push origin main
