name: Update Momentum Dashboard

on:
  schedule:
    - cron: '0 5 * * *'  # Läuft jeden Morgen um 05:00 UTC vollautomatisch
  workflow_dispatch:     # Erlaubt es dir, den Start manuell per Knopfdruck auszulösen

permissions:
  contents: write        # Gewährt dem Roboter Schreibrechte

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false # Verhindert Konflikte mit alten Anmeldedaten

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas openpyxl

      - name: Run Momentum Script
        run: python momentum_ranking.py

      - name: Commit and Push index.html
        env:
          HF_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add index.html
          
          # Nur committen, wenn sich tatsächlich etwas geändert hat
          git diff-index --quiet HEAD || git commit -m "Dashboard automatisch aktualisiert"
          
          # Der Trick: Wir authentifizieren den Push direkt über die URL mit dem Token
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
